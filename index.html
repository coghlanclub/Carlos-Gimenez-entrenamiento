<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos Gimenez — Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --navy:#0D2340;
    --navy-light:#15315C;
    --green:#14BE79;
    --green-dark:#0F6E56;
    --green-bg:rgba(20,190,121,0.1);
    --lightblue:#9FC8FF;
    --bg:#F4F6F8;
    --card:#FFFFFF;
    --border:#E2E6EB;
    --text:#10202F;
    --text2:#5C6B7A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
  }
  h1,h2,h3,.display{
    font-family:'Oswald',sans-serif;
    font-style:italic;
    font-weight:500;
    letter-spacing:0.3px;
    margin:0;
  }
  button{
    font-family:'Inter',sans-serif;
    cursor:pointer;
  }
  input,select{
    font-family:'Inter',sans-serif;
  }
  /* top nav */
  .topbar{
    background:var(--navy);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .nav{display:flex;gap:4px;}
  .nav button{
    background:transparent;
    border:0.5px solid rgba(255,255,255,0.2);
    color:#9FC8FF;
    font-size:13px;
    padding:7px 14px;
    border-radius:8px;
  }
  .nav button.active{
    background:rgba(255,255,255,0.12);
    color:#fff;
    border-color:rgba(255,255,255,0.3);
  }
  .container{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 60px;
  }
  .card{
    background:var(--card);
    border:0.5px solid var(--border);
    border-radius:var(--radius);
    padding:18px 20px;
  }
  .grid2{
    display:grid;
    grid-template-columns:220px 1fr;
    gap:16px;
  }
  .muted{color:var(--text2);font-size:13px;}
  .pillbtn{
    background:transparent;
    border:0.5px solid var(--border);
    border-radius:8px;
    font-size:12px;
    padding:6px 12px;
    color:var(--text);
  }
  .pillbtn.primary{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }
  .pillbtn.danger{
    color:#A32D2D;
  }
  .studentitem{
    text-align:left;
    width:100%;
    background:transparent;
    border:0.5px solid transparent;
    border-radius:8px;
    padding:8px 10px;
    font-size:13px;
    color:var(--text);
  }
  .studentitem.active{
    background:rgba(13,35,64,0.06);
    border-color:var(--navy);
  }
  .exrow{
    display:flex;
    gap:8px;
    align-items:center;
    border:0.5px solid var(--border);
    border-radius:10px;
    padding:10px;
    margin-bottom:8px;
  }
  .exrow input[type=text]{flex:1;}
  .exrow input{
    border:0.5px solid var(--border);
    border-radius:6px;
    padding:6px 8px;
    font-size:13px;
  }
  .exrow input[type=number]{width:54px;}
  .smallnum{width:54px;}
  .weekbtns{display:flex;gap:6px;margin-bottom:14px;}
  .weekbtns button{flex:1;border:0.5px solid var(--border);background:transparent;border-radius:8px;padding:7px 0;font-size:12px;}
  .weekbtns button.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  /* TV */
  .tv{
    background:var(--navy);
    border-radius:var(--radius);
    padding:24px;
    padding-bottom:100px;
    min-height:300px;
  }
  .tvgrid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(190px, 1fr));
    gap:12px;
    align-items:start;
  }
  .tvcard{
    background:rgba(255,255,255,0.07);
    border-radius:10px;
    padding:14px;
  }
  .tvcard .name{color:var(--green);font-size:22px;margin:0 0 12px;font-family:'Oswald';font-style:italic;font-weight:500;letter-spacing:0.3px;}
  .tvexlist{display:flex;flex-direction:column;gap:8px;}
  .tvex{border-top:0.5px solid rgba(255,255,255,0.12);padding-top:8px;}
  .tvex:first-child{border-top:none;padding-top:0;}
  .tvcard .ex{color:#fff;font-size:16px;font-weight:500;margin:0 0 3px;line-height:1.3;}
  .tvcard .meta{color:var(--lightblue);font-size:13px;margin:0;}
  .empty{
    color:var(--lightblue);
    font-size:14px;
    text-align:center;
    padding:60px 0;
    font-family:'Inter';
  }
  .athlete-card{
    border:0.5px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:10px;
  }
  .badge{
    font-size:11px;
    background:var(--green-bg);
    color:var(--green-dark);
    padding:2px 8px;
    border-radius:6px;
  }
  .toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .chip{
    border:0.5px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-size:13px;
    cursor:pointer;
    background:#fff;
  }
  .chip.selected{border:2px solid var(--green);background:var(--green-bg);}
  select.field, input.field{
    border:0.5px solid var(--border);
    border-radius:8px;
    padding:7px 10px;
    font-size:13px;
  }
  .note{
    font-size:12px;
    color:var(--green-dark);
    background:var(--green-bg);
    border-radius:8px;
    padding:8px 10px;
    margin-top:8px;
  }
  .loginbox{max-width:340px;margin:60px auto;text-align:center;}
  .logo-sm{width:30px;height:30px;}
  /* Online tab */
  .othread{
    max-width:520px;
    margin:0 auto;
    position:relative;
    padding-bottom:20px;
  }
  .othread::before{
    content:'';
    position:absolute;
    left:15px;
    top:6px;
    bottom:40px;
    width:2px;
    background:var(--border);
  }
  .oblock{
    position:relative;
    padding-left:38px;
    margin-bottom:12px;
  }
  .onode{
    position:absolute;
    left:0;
    top:2px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#fff;
    border:2px solid var(--green);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Oswald';
    font-style:italic;
    font-weight:500;
    font-size:13px;
    color:var(--green-dark);
  }
  .oexrow{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 0;
    border-top:0.5px solid var(--border);
  }
  .oexrow:first-child{border-top:none;padding-top:0;}
  .ocheck{
    width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--border);
    flex-shrink:0;cursor:pointer;background:#fff;
    display:flex;align-items:center;justify-content:center;
  }
  .ocheck.done{background:var(--green);border-color:var(--green);}
  .ocheck.done::after{content:'';width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
  .oexname{font-size:13px;font-weight:500;flex:1;}
  .oexname.done{color:var(--text2);text-decoration:line-through;text-decoration-color:var(--border);}
  .oload input{width:80px;font-size:12px;text-align:center;}
  .online-link-box{
    display:flex;align-items:center;gap:8px;
    background:var(--green-bg);border-radius:10px;
    padding:10px 12px;margin-bottom:18px;font-size:12px;color:var(--green-dark);
  }
  .tvhead{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:18px;position:relative;z-index:1;
  }
  .tvtitle{
    font-family:'Oswald';font-style:italic;font-weight:500;
    color:#fff;font-size:19px;letter-spacing:0.3px;
  }
  .tvcount{
    font-family:'Inter';font-size:12px;color:var(--green);
    border:0.5px solid rgba(20,190,121,0.4);
    padding:4px 10px;border-radius:20px;
  }
</style>
</head>

<script>
// Si window.storage no existe (por ejemplo al abrir este archivo fuera de Claude,
// como en un navegador normal o subido a Drive/Netlify), usamos localStorage como respaldo
// para que la app guarde y cargue datos igual.
if(!window.storage){
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem('cg_' + key);
      if(raw === null) return null;
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem('cg_' + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem('cg_' + key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k.startsWith('cg_' + (prefix||''))) keys.push(k.slice(3));
      }
      return { keys, prefix, shared: !!shared };
    }
  };
}

async function getJSON(key, fallback){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){
    return fallback;
  }
}
async function setJSON(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
  }catch(e){
    console.error('storage error', e);
  }
}

async function getStudents(){
  const stored = await getJSON('students', null);
  if(stored) return stored;
  return SEED_DATA.order;
}
async function getMonths(student){
  const stored = await getJSON('months:' + student, null);
  if(stored) return stored;
  if(SEED_DATA.students[student]) return [SEED_MONTH];
  return [SEED_MONTH];
}
async function addMonth(student, label, cloneFrom){
  const months = await getMonths(student);
  if(!months.includes(label)){
    months.push(label);
    await setJSON('months:' + student, months);
  }
  if(cloneFrom){
    const prev = await getRoutine(student, cloneFrom);
    const cleared = {};
    Object.keys(prev).forEach(day => {
      cleared[day] = prev[day].map(ex => ({...ex, weeks:['','','','']}));
    });
    await setRoutine(student, cleared, label);
  }
}
async function getRoutine(student, month){
  month = month || currentMonth;
  const stored = await getJSON('routine:' + student + ':' + month, null);
  if(stored) return stored;
  if(month === SEED_MONTH && SEED_DATA.students[student]) return SEED_DATA.students[student];
  return {};
}
async function setRoutine(student, data, month){
  month = month || currentMonth;
  await setJSON('routine:' + student + ':' + month, data);
}

  if(v==='online') navOnline.classList.add('active');
  if(v==='metricas') navMetrics.classList.add('active');
  if(v==='tv') navTv.classList.add('active');
  render();
}
navProf.onclick = ()=>switchNav('profesor');
navAlu.onclick = ()=>switchNav('alumno');
navOnline.onclick = ()=>switchNav('online');
navMetrics.onclick = ()=>switchNav('metricas');
navTv.onclick = ()=>switchNav('tv');

async function render(){
  if(view==='profesor') return renderProfesor();
  if(view==='alumno') return renderAlumno();
  if(view==='online') return renderOnline();
  if(view==='metricas') return renderMetricas();
  if(view==='tv') return renderTv();
}

// ---------- PROFESOR ----------
async function renderProfesor(){
  const students = await getStudents();
  if(!currentStudent || !students.includes(currentStudent)) currentStudent = students[0] || null;
  const months = currentStudent ? await getMonths(currentStudent) : [SEED_MONTH];
  if(!months.includes(currentMonth)) currentMonth = months[months.length-1];
  const routine = currentStudent ? await getRoutine(currentStudent, currentMonth) : {};
  const dayData = routine[currentDay] || [];
  const tvShow = await getTvShow();

  app.innerHTML = `
    <div class="grid2">
      <div class="card" style="padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <p class="muted" style="margin:0;">Alumnos</p>
          <button class="pillbtn" id="addStudentBtn" aria-label="agregar alumno"><i class="ti ti-plus"></i></button>
        </div>
        <div id="studentList"></div>
      </div>

      <div class="card">
        ${currentStudent ? `
        <div class="toprow">
          <h2>${currentStudent} <span id="tipoBadge" class="muted" style="font-size:11px;vertical-align:middle;"></span></h2>
          <div style="display:flex;gap:8px;">
            <button class="pillbtn" id="toggleTipoBtn"></button>
            <button class="pillbtn danger" id="removeStudentBtn"><i class="ti ti-trash" style="margin-right:4px;"></i>quitar alumno</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
          <select class="field" id="monthSel">
            ${months.map(m=>`<option ${m===currentMonth?'selected':''}>${m}</option>`).join('')}
          </select>
          <button class="pillbtn" id="newMonthBtn"><i class="ti ti-calendar-plus" style="margin-right:4px;"></i>nuevo mes</button>
          <span class="muted" style="font-size:11px;">cada mes queda guardado por separado</span>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
          <select class="field" id="daySel">
            ${DAYS.map(d=>`<option ${d===currentDay?'selected':''}>${d}</option>`).join('')}
          </select>
          <button class="pillbtn" id="addExBtn"><i class="ti ti-plus" style="margin-right:4px;"></i>agregar ejercicio</button>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-left:auto;">
            <input type="checkbox" id="tvToggle" ${tvShow.some(t=>t.student===currentStudent && t.day===currentDay && t.month===currentMonth) ? 'checked' : ''}/>
            mostrar en TV
          </label>
        </div>
        <div id="exEditList"></div>
        ` : `<div style="text-align:center;padding:30px 10px;"><img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:70px;opacity:0.85;margin-bottom:10px;"/><p class="muted">Agrega tu primer alumno para empezar.</p></div>`}
      </div>
    </div>
  `;

  const studentList = document.getElementById('studentList');
  const tipos = await getTipos();
  for(const s of students){
    const tipo = tipos[s] || 'box';
    const b = document.createElement('button');
    b.className = 'studentitem' + (s===currentStudent ? ' active' : '');
    b.innerHTML = `${s} <span style="float:right;font-size:10px;color:${tipo==='box'?'var(--green-dark)':'var(--navy)'};background:${tipo==='box'?'var(--green-bg)':'rgba(13,35,64,0.08)'};padding:1px 6px;border-radius:6px;">${tipo==='box'?'BOX':'INDIVIDUAL'}</span>`;
    b.onclick = ()=>{ currentStudent = s; currentDay='Dia 1'; renderProfesor(); };
    studentList.appendChild(b);
  }

  document.getElementById('addStudentBtn').onclick = async ()=>{
    const name = prompt('Nombre del nuevo alumno');
    if(name && name.trim()){
      const tipo = confirm('¿Es alumno de BOX? (Cancelar = Individual/Online)') ? 'box' : 'individual';
      const list = await getStudents();
      list.push(name.trim());
      await setJSON('students', list);
      await setTipo(name.trim(), tipo);
      currentStudent = name.trim();
      renderProfesor();
    }
  };

  if(currentStudent){
    const tipoActual = tipos[currentStudent] || 'box';
    const tipoBadgeEl = document.getElementById('tipoBadge');
    const toggleBtn = document.getElementById('toggleTipoBtn');
    tipoBadgeEl.textContent = tipoActual === 'box' ? '(Box)' : '(Individual / Online)';
    toggleBtn.innerHTML = tipoActual === 'box'
      ? '<i class="ti ti-switch-horizontal" style="margin-right:4px;"></i>pasar a Individual'
      : '<i class="ti ti-switch-horizontal" style="margin-right:4px;"></i>pasar a Box';
    toggleBtn.onclick = async ()=>{
      await setTipo(currentStudent, tipoActual === 'box' ? 'individual' : 'box');
      renderProfesor();
    };

    document.getElementById('removeStudentBtn').onclick = async ()=>{
      if(!confirm('Quitar a ' + currentStudent + '?')) return;
      const list = (await getStudents()).filter(s=>s!==currentStudent);
      await setJSON('students', list);
      currentStudent = list[0] || null;
      renderProfesor();
    };
    document.getElementById('monthSel').onchange = (e)=>{
      currentMonth = e.target.value;
      renderProfesor();
    };
    document.getElementById('newMonthBtn').onclick = async ()=>{
      const label = prompt('Nombre del nuevo mes (ej: Julio 2026)');
      if(label && label.trim()){
        await addMonth(currentStudent, label.trim(), currentMonth);
        currentMonth = label.trim();
        renderProfesor();
      }
    };
    document.getElementById('daySel').onchange = (e)=>{
      currentDay = e.target.value;
      renderProfesor();
    };
    document.getElementById('addExBtn').onclick = async ()=>{
      const routine = await getRoutine(currentStudent, currentMonth);
      const list = routine[currentDay] || [];
      list.push({name:'Nuevo ejercicio', series:3, reps:10, weeks:['','','','']});
      routine[currentDay] = list;
      await setRoutine(currentStudent, routine, currentMonth);
      renderProfesor();
    };
    document.getElementById('tvToggle').onchange = async (e)=>{
      let list = await getTvShow();
      list = list.filter(t=>!(t.student===currentStudent));
      if(e.target.checked) list.push({student:currentStudent, day:currentDay, month:currentMonth});
      await setTvShow(list);
    };

    const exList = document.getElementById('exEditList');
    dayData.forEach((ex,i)=>{
      const row = document.createElement('div');
      row.className = 'exrow';
      row.innerHTML = `
        <input type="text" data-f="name" data-i="${i}" value="${ex.name}"/>
        <input type="text" class="smallnum" data-f="series" data-i="${i}" value="${ex.series}" title="series"/>
        <span class="muted">x</span>
        <input type="text" class="smallnum" data-f="reps" data-i="${i}" value="${ex.reps}" title="reps"/>
        ${[0,1,2,3].map(w=>`<input type="text" class="smallnum" data-w="${w}" data-i="${i}" value="${ex.weeks[w]||''}" title="semana ${w+1}"/>`).join('')}
        <button class="pillbtn" data-del="${i}" aria-label="quitar ejercicio" title="quitar ejercicio" style="color:#c0392b;border-color:#c0392b;padding:4px 10px;font-size:13px;"><i class="ti ti-trash" style="font-size:14px;"></i></button>
      `;
      exList.appendChild(row);
    });

    exList.querySelectorAll('input[data-f]').forEach(inp=>{
      inp.onchange = async ()=>{
        const routine = await getRoutine(currentStudent, currentMonth);
        const list = routine[currentDay] || [];
        const i = inp.dataset.i, f = inp.dataset.f;
        list[i][f] = inp.value;
        routine[currentDay] = list;
        await setRoutine(currentStudent, routine, currentMonth);
      };
    });
    exList.querySelectorAll('input[data-w]').forEach(inp=>{
      inp.onchange = async ()=>{
        const routine = await getRoutine(currentStudent, currentMonth);
        const list = routine[currentDay] || [];
        const i = inp.dataset.i, w = inp.dataset.w;
        list[i].weeks[w] = inp.value;
        routine[currentDay] = list;
        await setRoutine(currentStudent, routine, currentMonth);
      };
    });
    exList.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = async ()=>{
        const routine = await getRoutine(currentStudent, currentMonth);
        const list = routine[currentDay] || [];
        list.splice(Number(btn.dataset.del),1);
        routine[currentDay] = list;
        await setRoutine(currentStudent, routine, currentMonth);
        renderProfesor();
      };
    });
  }
}

  });

// ---------- ONLINE ----------
async function renderOnline(){
  const allStudents = await getStudents();
  const tipos = await getTipos();
  const students = allStudents.filter(s => (tipos[s] || 'box') === 'individual');
  if(!currentStudent || !students.includes(currentStudent)) currentStudent = students[0] || null;

  if(students.length === 0){
    app.innerHTML = `
      <div style="max-width:480px;margin:60px auto;text-align:center;">
        <img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:70px;opacity:0.85;margin-bottom:14px;"/>
        <h2>Todavia no marcaste a nadie como Individual</h2>
        <p class="muted">Esta pestaña es solo para tus alumnos personalizados / online — son un publico aparte de los del box. Andá a Profesor, elegí un alumno y tocá "pasar a Individual" para que aparezca aca.</p>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div style="max-width:520px;margin:0 auto;">
      <div class="toprow">
        <select class="field" id="onStudentSel">
          ${students.map(s=>`<option ${s===currentStudent?'selected':''}>${s}</option>`).join('')}
        </select>
        <select class="field" id="onDaySel">
          ${DAYS.map(d=>`<option ${d===currentDay?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="online-link-box">
        <i class="ti ti-link"></i>
        esta es la pagina que le mandarias por link a ${currentStudent || 'tu alumno'} — alumno individual / online, aparte del box
      </div>
      <div id="onlineBody"></div>
    </div>
  `;

  document.getElementById('onStudentSel').onchange = (e)=>{ currentStudent = e.target.value; renderOnline(); };
  document.getElementById('onDaySel').onchange = (e)=>{ currentDay = e.target.value; renderOnline(); };

  const body = document.getElementById('onlineBody');
  if(!currentStudent){ body.innerHTML = '<p class="muted">Todavia no hay alumnos cargados.</p>'; return; }

  const routine = await getRoutine(currentStudent);
  const dayData = routine[currentDay] || [];
  const log = await getLog(currentStudent, currentDay, 'online');

  if(dayData.length===0){
    body.innerHTML = '<p class="muted">No hay ejercicios cargados para este dia todavia. Cargalos desde Profesor y van a aparecer aca solos.</p>';
    return;
  }

  body.innerHTML = `<div class="othread" id="othread"></div>`;
  const thread = document.getElementById('othread');
  dayData.forEach((ex,i)=>{
    const entry = log[i] || {done:false, value:''};
    const block = document.createElement('div');
    block.className = 'oblock';
    block.innerHTML = `
      <div class="onode">${i+1}</div>
      <div class="card" style="padding:12px 14px;">
        <div class="oexrow">
          <div class="ocheck ${entry.done?'done':''}" data-i="${i}"></div>
          <div class="oexname ${entry.done?'done':''}" data-i="${i}">${ex.name}<div class="muted" style="font-size:11px;margin-top:2px;">${ex.series} x ${ex.reps}</div></div>
          <div class="oload"><input type="text" data-i="${i}" placeholder="kg / carga" value="${entry.value||''}"/></div>
        </div>
      </div>
    `;
    thread.appendChild(block);
  });

  thread.querySelectorAll('.ocheck').forEach(c=>{
    c.onclick = async ()=>{
      const log = await getLog(currentStudent, currentDay, 'online');
      const i = c.dataset.i;
      log[i] = log[i] || {done:false,value:''};
      log[i].done = !log[i].done;
      await setLog(currentStudent, currentDay, 'online', log);
      renderOnline();
    };
  });
  thread.querySelectorAll('.oload input').forEach(inp=>{
    inp.onchange = async ()=>{
      const log = await getLog(currentStudent, currentDay, 'online');
      const i = inp.dataset.i;
      log[i] = log[i] || {done:false,value:''};
      log[i].value = inp.value;
      await setLog(currentStudent, currentDay, 'online', log);
    };
  });
}

// ---------- METRICAS ----------
function parseNumeric(val){
  if(!val) return null;
  const m = String(val).match(/-?\d+([.,]\d+)?/);
  if(!m) return null;
  return parseFloat(m[0].replace(',', '.'));
}

    <div class="toprow">
      <select class="field" id="metStudentSel">
        ${students.map(s=>`<option ${s===currentStudent?'selected':''}>${s}</option>`).join('')}
      </select>
      <input type="text" class="field" id="metExSearch" placeholder="Buscar ejercicio..." style="flex:1;max-width:260px;"/>
    </div>
    <div id="metBody"></div>
  `;
  document.getElementById('metStudentSel').onchange = (e)=>{ currentStudent = e.target.value; metExercise = null; renderMetricas(); };

  const body = document.getElementById('metBody');
  if(!currentStudent){ body.innerHTML = '<p class="muted">Todavia no hay alumnos cargados.</p>'; return; }

  const months = await getMonths(currentStudent);

  // construimos la lista de ejercicios unicos que aparecieron en cualquier mes/dia
  const exerciseNames = new Set();
  const dataByMonth = {};
  for(const month of months){
    const routine = await getRoutine(currentStudent, month);
    dataByMonth[month] = routine;
    Object.values(routine).forEach(list=>{
      (list||[]).forEach(ex=> exerciseNames.add(ex.name));
    });
  }
  const allNames = [...exerciseNames].sort();
  if(!metExercise || !allNames.includes(metExercise)) metExercise = allNames[0] || null;

  if(!metExercise){
    body.innerHTML = `<div style="text-align:center;padding:30px 10px;"><img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:70px;opacity:0.85;margin-bottom:10px;"/><p class="muted">Este alumno todavia no tiene ejercicios cargados.</p></div>`;
    return;
  }

  function renderExercisePanel(){
    // recopilamos, por mes, los valores de ese ejercicio (puede aparecer en varios dias)
    const points = [];
    months.forEach(month=>{
      const routine = dataByMonth[month];
      Object.keys(routine).forEach(day=>{
        (routine[day]||[]).forEach(ex=>{
          if(ex.name === metExercise){
            const lastVal = [...ex.weeks].reverse().find(w=>w && w.trim()!=='') || '';
            points.push({month, day, series: ex.series, reps: ex.reps, weeks: ex.weeks, lastVal});
          }
        });
      });
    });

    const numericPoints = points.map(p=>parseNumeric(p.lastVal)).filter(v=>v!==null);
    const maxVal = Math.max(1, ...numericPoints);
    const first = numericPoints[0];
    const last = numericPoints[numericPoints.length-1];
    let trendHtml = '';
    if(first !== undefined && last !== undefined && numericPoints.length > 1){
      const diff = last - first;
      const pct = first !== 0 ? Math.round((diff/first)*100) : 0;
      const up = diff > 0;
      trendHtml = `
        <div style="display:flex;align-items:center;gap:8px;background:${up?'var(--green-bg)':'var(--bg)'};border-radius:10px;padding:10px 14px;margin-bottom:16px;">
          <i class="ti ti-trending-${up?'up':'down'}" style="font-size:18px;color:${up?'var(--green-dark)':'var(--text2)'};"></i>
          <span style="font-size:13px;color:${up?'var(--green-dark)':'var(--text2)'};">
            ${first} → ${last} ${up ? '(+' : '('}${pct}% desde el primer registro)
          </span>
        </div>
      `;
    }

    return `
      <div class="card" style="padding:18px 20px;">
        <h3 style="margin:0 0 4px;">${metExercise}</h3>
        <p class="muted" style="margin:0 0 16px;">${points.length} registro${points.length===1?'':'s'} en ${months.length} mes${months.length===1?'':'es'}</p>
        ${trendHtml}
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${points.map(p=>{
            const num = parseNumeric(p.lastVal);
            const barWidth = num !== null ? Math.round((num/maxVal)*100) : 0;
            return `
              <div>
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
                  <span>${p.month} <span class="muted">· ${p.day} · ${p.series}x${p.reps}</span></span>
                  <span style="font-weight:500;">${p.lastVal || '—'}</span>
                </div>
                <div style="background:var(--bg);border-radius:6px;height:8px;overflow:hidden;">
                  <div style="background:var(--green);height:100%;width:${num!==null ? barWidth : 4}%;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  body.innerHTML = `
    <div style="display:grid;grid-template-columns:200px 1fr;gap:16px;">
      <div class="card" style="padding:10px;max-height:420px;overflow-y:auto;">
        <p class="muted" style="margin:0 0 8px;font-size:11px;">Ejercicios de ${currentStudent}</p>
        <div id="metExList"></div>
      </div>
      <div id="metExPanel">${renderExercisePanel()}</div>
    </div>
  `;

  function renderExList(filter){
    const list = document.getElementById('metExList');
    const filtered = filter ? allNames.filter(n=>n.toLowerCase().includes(filter.toLowerCase())) : allNames;
    list.innerHTML = filtered.map(n=>`
      <button class="studentitem ${n===metExercise?'active':''}" data-ex="${n}" style="font-size:12px;">${n}</button>
    `).join('') || '<p class="muted" style="font-size:12px;">sin resultados</p>';
    list.querySelectorAll('[data-ex]').forEach(btn=>{
      btn.onclick = ()=>{
        metExercise = btn.dataset.ex;
        document.getElementById('metExPanel').innerHTML = renderExercisePanel();
        renderExList(document.getElementById('metExSearch').value);
      };
    });
  }
  renderExList('');

  document.getElementById('metExSearch').oninput = (e)=> renderExList(e.target.value);
}

// ---------- TV ----------
async function renderTv(){
  const tvShow = await getTvShow();
  const isPublished = window.location.protocol === 'http:' || window.location.protocol === 'https:';
  const tvLink = 'https://coghlanclub.github.io/Carlos-Gimenez-entrenamiento/?view=alumno';
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=8&color=13-35-64&bgcolor=255-255-255&data=' + encodeURIComponent(tvLink);

  const qrBlock = isPublished
    ? `<img src="${qrSrc}" alt="QR para ver tu rutina" width="70" height="70"/>
       <div>
         <p style="font-family:'Oswald';font-style:italic;font-weight:500;color:var(--navy);font-size:12px;margin:0 0 2px;">Escaneá tu QR</p>
         <p style="font-family:'Inter';color:var(--text2);font-size:10px;margin:0;max-width:120px;line-height:1.3;">vé tu rutina desde el celular</p>
       </div>`
    : `<i class="ti ti-qrcode" style="font-size:34px;color:var(--text2);"></i>
       <div>
         <p style="font-family:'Oswald';font-style:italic;font-weight:500;color:var(--navy);font-size:12px;margin:0 0 2px;">QR pendiente</p>
         <p style="font-family:'Inter';color:var(--text2);font-size:10px;margin:0;max-width:140px;line-height:1.3;">se activa solo cuando publiques esta app con un link real</p>
       </div>`;

  app.innerHTML = `
    <div class="tv" style="position:relative;overflow:hidden;">
      <img src="data:image/png;base64,${MASCOT_RUN_B64}" alt="" style="position:absolute;right:-10px;bottom:-10px;width:320px;opacity:0.18;pointer-events:none;"/>
      <div class="tvhead">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="data:image/png;base64,${MASCOT_FACE_B64}" alt="" style="width:30px;"/>
          <span class="tvtitle">Entrenamiento de hoy</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="tvcount">${tvShow.length} en pista</span>
          <button id="fullscreenBtn" style="background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:5px;">
            <i class="ti ti-arrows-maximize"></i> pantalla completa
          </button>
        </div>
      </div>
      <div class="tvgrid" id="tvGrid"></div>
      <div style="position:absolute;left:18px;bottom:18px;background:#fff;border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px;z-index:2;">
        ${qrBlock}
      </div>
    </div>
  `;
  document.getElementById('fullscreenBtn').onclick = ()=>{
    const tvEl = document.querySelector('.tv');
    if(!document.fullscreenElement){
      tvEl.requestFullscreen?.() || tvEl.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  };
  const grid = document.getElementById('tvGrid');

  if(tvShow.length===0){
    app.querySelector('.tv').innerHTML = `<div class="empty"><img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:90px;opacity:0.9;margin-bottom:12px;"/><br/>Nadie seleccionado todavia. Activalo desde el panel del profesor.</div>`;
    return;
  }

  for(const item of tvShow){
    const routine = await getRoutine(item.student, item.month);
    const dayData = routine[item.day] || [];
    const card = document.createElement('div');
    card.className = 'tvcard';
    if(dayData.length === 0){
      card.innerHTML = `<p class="name">${item.student}</p><p class="meta">sin rutina cargada</p>`;
      grid.appendChild(card);
      continue;
    }
    const rows = dayData.map(ex => {
      const load = [...ex.weeks].reverse().find(w => w && w.trim() !== '') || '';
      return `
        <div class="tvex">
          <p class="ex">${ex.name}</p>
          <p class="meta">${ex.series} x ${ex.reps}${load ? ' · ' + load : ''}</p>
        </div>
      `;
    }).join('');
    card.innerHTML = `<p class="name">${item.student}</p><div class="tvexlist">${rows}</div>`;
    grid.appendChild(card);
  }
}

function slugify(name){
  return name.trim().toLowerCase()
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

async function applyUrlParams(){
  const params = new URLSearchParams(window.location.search);
  const alumnoParam = params.get('alumno');
  const viewParam = params.get('view');
  if(alumnoParam){
    const students = await getStudents();
    const match = students.find(s => slugify(s) === alumnoParam.toLowerCase());
    if(match){
      currentStudent = match;
      view = 'online';
      [navProf,navAlu,navOnline,navMetrics,navTv].forEach(b=>b.classList.remove('active'));
      navOnline.classList.add('active');
    }
  } else if(viewParam === 'alumno'){
    view = 'alumno';
    [navProf,navAlu,navOnline,navMetrics,navTv].forEach(b=>b.classList.remove('active'));
    navAlu.classList.add('active');
  }
}

applyUrlParams().then(()=> ensureSeeded().then(render));
</script>

<script>
// Si window.storage no existe (por ejemplo al abrir este archivo fuera de Claude,
// como en un navegador normal o subido a Drive/Netlify), usamos localStorage como respaldo
// para que la app guarde y cargue datos igual.
if(!window.storage){
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem('cg_' + key);
      if(raw === null) return null;
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem('cg_' + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem('cg_' + key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k.startsWith('cg_' + (prefix||''))) keys.push(k.slice(3));
      }
      return { keys, prefix, shared: !!shared };
    }
  };
}

async function getJSON(key, fallback){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){
    return fallback;
  }
}
async function setJSON(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
  }catch(e){
    console.error('storage error', e);
  }
}

async function getStudents(){
  const stored = await getJSON('students', null);
  if(stored) return stored;
  return SEED_DATA.order;
}
async function getMonths(student){
  const stored = await getJSON('months:' + student, null);
  if(stored) return stored;
  if(SEED_DATA.students[student]) return [SEED_MONTH];
  return [SEED_MONTH];
}
async function addMonth(student, label, cloneFrom){
  const months = await getMonths(student);
  if(!months.includes(label)){
    months.push(label);
    await setJSON('months:' + student, months);
  }
  if(cloneFrom){
    const prev = await getRoutine(student, cloneFrom);
    const cleared = {};
    Object.keys(prev).forEach(day => {
      cleared[day] = prev[day].map(ex => ({...ex, weeks:['','','','']}));
    });
    await setRoutine(student, cleared, label);
  }
}
async function getRoutine(student, month){
  month = month || currentMonth;
  const stored = await getJSON('routine:' + student + ':' + month, null);
  if(stored) return stored;
  if(month === SEED_MONTH && SEED_DATA.students[student]) return SEED_DATA.students[student];
  return {};
}
async function setRoutine(student, data, month){
  month = month || currentMonth;
  await setJSON('routine:' + student + ':' + month, data);
}

  if(v==='online') navOnline.classList.add('active');
  if(v==='metricas') navMetrics.classList.add('active');
  if(v==='tv') navTv.classList.add('active');
  render();
}
navProf.onclick = ()=>switchNav('profesor');
navAlu.onclick = ()=>switchNav('alumno');
navOnline.onclick = ()=>switchNav('online');
navMetrics.onclick = ()=>switchNav('metricas');
navTv.onclick = ()=>switchNav('tv');

async function render(){
  if(view==='profesor') return renderProfesor();
  if(view==='alumno') return renderAlumno();
  if(view==='online') return renderOnline();
  if(view==='metricas') return renderMetricas();
  if(view==='tv') return renderTv();
}

// ---------- PROFESOR ----------
async function renderProfesor(){
  const students = await getStudents();
  if(!currentStudent || !students.includes(currentStudent)) currentStudent = students[0] || null;
  const months = currentStudent ? await getMonths(currentStudent) : [SEED_MONTH];
  if(!months.includes(currentMonth)) currentMonth = months[months.length-1];
  const routine = currentStudent ? await getRoutine(currentStudent, currentMonth) : {};
  const dayData = routine[currentDay] || [];
  const tvShow = await getTvShow();

  app.innerHTML = `
    <div class="grid2">
      <div class="card" style="padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <p class="muted" style="margin:0;">Alumnos</p>
          <button class="pillbtn" id="addStudentBtn" aria-label="agregar alumno"><i class="ti ti-plus"></i></button>
        </div>
        <div id="studentList"></div>
      </div>

      <div class="card">
        ${currentStudent ? `
        <div class="toprow">
          <h2>${currentStudent} <span id="tipoBadge" class="muted" style="font-size:11px;vertical-align:middle;"></span></h2>
          <div style="display:flex;gap:8px;">
            <button class="pillbtn" id="toggleTipoBtn"></button>
            <button class="pillbtn danger" id="removeStudentBtn"><i class="ti ti-trash" style="margin-right:4px;"></i>quitar alumno</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
          <select class="field" id="monthSel">
            ${months.map(m=>`<option ${m===currentMonth?'selected':''}>${m}</option>`).join('')}
          </select>
          <button class="pillbtn" id="newMonthBtn"><i class="ti ti-calendar-plus" style="margin-right:4px;"></i>nuevo mes</button>
          <span class="muted" style="font-size:11px;">cada mes queda guardado por separado</span>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
          <select class="field" id="daySel">
            ${DAYS.map(d=>`<option ${d===currentDay?'selected':''}>${d}</option>`).join('')}
          </select>
          <button class="pillbtn" id="addExBtn"><i class="ti ti-plus" style="margin-right:4px;"></i>agregar ejercicio</button>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-left:auto;">
            <input type="checkbox" id="tvToggle" ${tvShow.some(t=>t.student===currentStudent && t.day===currentDay && t.month===currentMonth) ? 'checked' : ''}/>
            mostrar en TV
          </label>
        </div>
        <div id="exEditList"></div>
        ` : `<div style="text-align:center;padding:30px 10px;"><img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:70px;opacity:0.85;margin-bottom:10px;"/><p class="muted">Agrega tu primer alumno para empezar.</p></div>`}
      </div>
    </div>
  `;

  const studentList = document.getElementById('studentList');
  const tipos = await getTipos();
  for(const s of students){
    const tipo = tipos[s] || 'box';
    const b = document.createElement('button');
    b.className = 'studentitem' + (s===currentStudent ? ' active' : '');
    b.innerHTML = `${s} <span style="float:right;font-size:10px;color:${tipo==='box'?'var(--green-dark)':'var(--navy)'};background:${tipo==='box'?'var(--green-bg)':'rgba(13,35,64,0.08)'};padding:1px 6px;border-radius:6px;">${tipo==='box'?'BOX':'INDIVIDUAL'}</span>`;
    b.onclick = ()=>{ currentStudent = s; currentDay='Dia 1'; renderProfesor(); };
    studentList.appendChild(b);
  }

  document.getElementById('addStudentBtn').onclick = async ()=>{
    const name = prompt('Nombre del nuevo alumno');
    if(name && name.trim()){
      const tipo = confirm('¿Es alumno de BOX? (Cancelar = Individual/Online)') ? 'box' : 'individual';
      const list = await getStudents();
      list.push(name.trim());
      await setJSON('students', list);
      await setTipo(name.trim(), tipo);
      currentStudent = name.trim();
      renderProfesor();
    }
  };

  if(currentStudent){
    const tipoActual = tipos[currentStudent] || 'box';
    const tipoBadgeEl = document.getElementById('tipoBadge');
    const toggleBtn = document.getElementById('toggleTipoBtn');
    tipoBadgeEl.textContent = tipoActual === 'box' ? '(Box)' : '(Individual / Online)';
    toggleBtn.innerHTML = tipoActual === 'box'
      ? '<i class="ti ti-switch-horizontal" style="margin-right:4px;"></i>pasar a Individual'
      : '<i class="ti ti-switch-horizontal" style="margin-right:4px;"></i>pasar a Box';
    toggleBtn.onclick = async ()=>{
      await setTipo(currentStudent, tipoActual === 'box' ? 'individual' : 'box');
      renderProfesor();
    };

    document.getElementById('removeStudentBtn').onclick = async ()=>{
      if(!confirm('Quitar a ' + currentStudent + '?')) return;
      const list = (await getStudents()).filter(s=>s!==currentStudent);
      await setJSON('students', list);
      currentStudent = list[0] || null;
      renderProfesor();
    };
    document.getElementById('monthSel').onchange = (e)=>{
      currentMonth = e.target.value;
      renderProfesor();
    };
    document.getElementById('newMonthBtn').onclick = async ()=>{
      const label = prompt('Nombre del nuevo mes (ej: Julio 2026)');
      if(label && label.trim()){
        await addMonth(currentStudent, label.trim(), currentMonth);
        currentMonth = label.trim();
        renderProfesor();
      }
    };
    document.getElementById('daySel').onchange = (e)=>{
      currentDay = e.target.value;
      renderProfesor();
    };
    document.getElementById('addExBtn').onclick = async ()=>{
      const routine = await getRoutine(currentStudent, currentMonth);
      const list = routine[currentDay] || [];
      list.push({name:'Nuevo ejercicio', series:3, reps:10, weeks:['','','','']});
      routine[currentDay] = list;
      await setRoutine(currentStudent, routine, currentMonth);
      renderProfesor();
    };
    document.getElementById('tvToggle').onchange = async (e)=>{
      let list = await getTvShow();
      list = list.filter(t=>!(t.student===currentStudent));
      if(e.target.checked) list.push({student:currentStudent, day:currentDay, month:currentMonth});
      await setTvShow(list);
    };

    const exList = document.getElementById('exEditList');
    dayData.forEach((ex,i)=>{
      const row = document.createElement('div');
      row.className = 'exrow';
      row.innerHTML = `
        <input type="text" data-f="name" data-i="${i}" value="${ex.name}"/>
        <input type="text" class="smallnum" data-f="series" data-i="${i}" value="${ex.series}" title="series"/>
        <span class="muted">x</span>
        <input type="text" class="smallnum" data-f="reps" data-i="${i}" value="${ex.reps}" title="reps"/>
        ${[0,1,2,3].map(w=>`<input type="text" class="smallnum" data-w="${w}" data-i="${i}" value="${ex.weeks[w]||''}" title="semana ${w+1}"/>`).join('')}
        <button class="pillbtn" data-del="${i}" aria-label="quitar"><i class="ti ti-x"></i></button>
      `;
      exList.appendChild(row);
    });

    exList.querySelectorAll('input[data-f]').forEach(inp=>{
      inp.onchange = async ()=>{
        const routine = await getRoutine(currentStudent, currentMonth);
        const list = routine[currentDay] || [];
        const i = inp.dataset.i, f = inp.dataset.f;
        list[i][f] = inp.value;
        routine[currentDay] = list;
        await setRoutine(currentStudent, routine, currentMonth);
      };
    });
    exList.querySelectorAll('input[data-w]').forEach(inp=>{
      inp.onchange = async ()=>{
        const routine = await getRoutine(currentStudent, currentMonth);
        const list = routine[currentDay] || [];
        const i = inp.dataset.i, w = inp.dataset.w;
        list[i].weeks[w] = inp.value;
        routine[currentDay] = list;
        await setRoutine(currentStudent, routine, currentMonth);
      };
    });
    exList.querySelectorAll('[data-del]').forEach(btn=>{
      btn.onclick = async ()=>{
        const routine = await getRoutine(currentStudent, currentMonth);
        const list = routine[currentDay] || [];
        list.splice(Number(btn.dataset.del),1);
        routine[currentDay] = list;
        await setRoutine(currentStudent, routine, currentMonth);
        renderProfesor();
      };
    });
  }
}

  });

// ---------- ONLINE ----------
async function renderOnline(){
  const allStudents = await getStudents();
  const tipos = await getTipos();
  const students = allStudents.filter(s => (tipos[s] || 'box') === 'individual');
  if(!currentStudent || !students.includes(currentStudent)) currentStudent = students[0] || null;

  if(students.length === 0){
    app.innerHTML = `
      <div style="max-width:480px;margin:60px auto;text-align:center;">
        <img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:70px;opacity:0.85;margin-bottom:14px;"/>
        <h2>Todavia no marcaste a nadie como Individual</h2>
        <p class="muted">Esta pestaña es solo para tus alumnos personalizados / online — son un publico aparte de los del box. Andá a Profesor, elegí un alumno y tocá "pasar a Individual" para que aparezca aca.</p>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div style="max-width:520px;margin:0 auto;">
      <div class="toprow">
        <select class="field" id="onStudentSel">
          ${students.map(s=>`<option ${s===currentStudent?'selected':''}>${s}</option>`).join('')}
        </select>
        <select class="field" id="onDaySel">
          ${DAYS.map(d=>`<option ${d===currentDay?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="online-link-box">
        <i class="ti ti-link"></i>
        esta es la pagina que le mandarias por link a ${currentStudent || 'tu alumno'} — alumno individual / online, aparte del box
      </div>
      <div id="onlineBody"></div>
    </div>
  `;

  document.getElementById('onStudentSel').onchange = (e)=>{ currentStudent = e.target.value; renderOnline(); };
  document.getElementById('onDaySel').onchange = (e)=>{ currentDay = e.target.value; renderOnline(); };

  const body = document.getElementById('onlineBody');
  if(!currentStudent){ body.innerHTML = '<p class="muted">Todavia no hay alumnos cargados.</p>'; return; }

  const routine = await getRoutine(currentStudent);
  const dayData = routine[currentDay] || [];
  const log = await getLog(currentStudent, currentDay, 'online');

  if(dayData.length===0){
    body.innerHTML = '<p class="muted">No hay ejercicios cargados para este dia todavia. Cargalos desde Profesor y van a aparecer aca solos.</p>';
    return;
  }

  body.innerHTML = `<div class="othread" id="othread"></div>`;
  const thread = document.getElementById('othread');
  dayData.forEach((ex,i)=>{
    const entry = log[i] || {done:false, value:''};
    const block = document.createElement('div');
    block.className = 'oblock';
    block.innerHTML = `
      <div class="onode">${i+1}</div>
      <div class="card" style="padding:12px 14px;">
        <div class="oexrow">
          <div class="ocheck ${entry.done?'done':''}" data-i="${i}"></div>
          <div class="oexname ${entry.done?'done':''}" data-i="${i}">${ex.name}<div class="muted" style="font-size:11px;margin-top:2px;">${ex.series} x ${ex.reps}</div></div>
          <div class="oload"><input type="text" data-i="${i}" placeholder="kg / carga" value="${entry.value||''}"/></div>
        </div>
      </div>
    `;
    thread.appendChild(block);
  });

  thread.querySelectorAll('.ocheck').forEach(c=>{
    c.onclick = async ()=>{
      const log = await getLog(currentStudent, currentDay, 'online');
      const i = c.dataset.i;
      log[i] = log[i] || {done:false,value:''};
      log[i].done = !log[i].done;
      await setLog(currentStudent, currentDay, 'online', log);
      renderOnline();
    };
  });
  thread.querySelectorAll('.oload input').forEach(inp=>{
    inp.onchange = async ()=>{
      const log = await getLog(currentStudent, currentDay, 'online');
      const i = inp.dataset.i;
      log[i] = log[i] || {done:false,value:''};
      log[i].value = inp.value;
      await setLog(currentStudent, currentDay, 'online', log);
    };
  });
}

// ---------- METRICAS ----------
function parseNumeric(val){
  if(!val) return null;
  const m = String(val).match(/-?\d+([.,]\d+)?/);
  if(!m) return null;
  return parseFloat(m[0].replace(',', '.'));
}

    <div class="toprow">
      <select class="field" id="metStudentSel">
        ${students.map(s=>`<option ${s===currentStudent?'selected':''}>${s}</option>`).join('')}
      </select>
      <input type="text" class="field" id="metExSearch" placeholder="Buscar ejercicio..." style="flex:1;max-width:260px;"/>
    </div>
    <div id="metBody"></div>
  `;
  document.getElementById('metStudentSel').onchange = (e)=>{ currentStudent = e.target.value; metExercise = null; renderMetricas(); };

  const body = document.getElementById('metBody');
  if(!currentStudent){ body.innerHTML = '<p class="muted">Todavia no hay alumnos cargados.</p>'; return; }

  const months = await getMonths(currentStudent);

  // construimos la lista de ejercicios unicos que aparecieron en cualquier mes/dia
  const exerciseNames = new Set();
  const dataByMonth = {};
  for(const month of months){
    const routine = await getRoutine(currentStudent, month);
    dataByMonth[month] = routine;
    Object.values(routine).forEach(list=>{
      (list||[]).forEach(ex=> exerciseNames.add(ex.name));
    });
  }
  const allNames = [...exerciseNames].sort();
  if(!metExercise || !allNames.includes(metExercise)) metExercise = allNames[0] || null;

  if(!metExercise){
    body.innerHTML = `<div style="text-align:center;padding:30px 10px;"><img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:70px;opacity:0.85;margin-bottom:10px;"/><p class="muted">Este alumno todavia no tiene ejercicios cargados.</p></div>`;
    return;
  }

  function renderExercisePanel(){
    // recopilamos, por mes, los valores de ese ejercicio (puede aparecer en varios dias)
    const points = [];
    months.forEach(month=>{
      const routine = dataByMonth[month];
      Object.keys(routine).forEach(day=>{
        (routine[day]||[]).forEach(ex=>{
          if(ex.name === metExercise){
            const lastVal = [...ex.weeks].reverse().find(w=>w && w.trim()!=='') || '';
            points.push({month, day, series: ex.series, reps: ex.reps, weeks: ex.weeks, lastVal});
          }
        });
      });
    });

    const numericPoints = points.map(p=>parseNumeric(p.lastVal)).filter(v=>v!==null);
    const maxVal = Math.max(1, ...numericPoints);
    const first = numericPoints[0];
    const last = numericPoints[numericPoints.length-1];
    let trendHtml = '';
    if(first !== undefined && last !== undefined && numericPoints.length > 1){
      const diff = last - first;
      const pct = first !== 0 ? Math.round((diff/first)*100) : 0;
      const up = diff > 0;
      trendHtml = `
        <div style="display:flex;align-items:center;gap:8px;background:${up?'var(--green-bg)':'var(--bg)'};border-radius:10px;padding:10px 14px;margin-bottom:16px;">
          <i class="ti ti-trending-${up?'up':'down'}" style="font-size:18px;color:${up?'var(--green-dark)':'var(--text2)'};"></i>
          <span style="font-size:13px;color:${up?'var(--green-dark)':'var(--text2)'};">
            ${first} → ${last} ${up ? '(+' : '('}${pct}% desde el primer registro)
          </span>
        </div>
      `;
    }

    return `
      <div class="card" style="padding:18px 20px;">
        <h3 style="margin:0 0 4px;">${metExercise}</h3>
        <p class="muted" style="margin:0 0 16px;">${points.length} registro${points.length===1?'':'s'} en ${months.length} mes${months.length===1?'':'es'}</p>
        ${trendHtml}
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${points.map(p=>{
            const num = parseNumeric(p.lastVal);
            const barWidth = num !== null ? Math.round((num/maxVal)*100) : 0;
            return `
              <div>
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
                  <span>${p.month} <span class="muted">· ${p.day} · ${p.series}x${p.reps}</span></span>
                  <span style="font-weight:500;">${p.lastVal || '—'}</span>
                </div>
                <div style="background:var(--bg);border-radius:6px;height:8px;overflow:hidden;">
                  <div style="background:var(--green);height:100%;width:${num!==null ? barWidth : 4}%;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  body.innerHTML = `
    <div style="display:grid;grid-template-columns:200px 1fr;gap:16px;">
      <div class="card" style="padding:10px;max-height:420px;overflow-y:auto;">
        <p class="muted" style="margin:0 0 8px;font-size:11px;">Ejercicios de ${currentStudent}</p>
        <div id="metExList"></div>
      </div>
      <div id="metExPanel">${renderExercisePanel()}</div>
    </div>
  `;

  function renderExList(filter){
    const list = document.getElementById('metExList');
    const filtered = filter ? allNames.filter(n=>n.toLowerCase().includes(filter.toLowerCase())) : allNames;
    list.innerHTML = filtered.map(n=>`
      <button class="studentitem ${n===metExercise?'active':''}" data-ex="${n}" style="font-size:12px;">${n}</button>
    `).join('') || '<p class="muted" style="font-size:12px;">sin resultados</p>';
    list.querySelectorAll('[data-ex]').forEach(btn=>{
      btn.onclick = ()=>{
        metExercise = btn.dataset.ex;
        document.getElementById('metExPanel').innerHTML = renderExercisePanel();
        renderExList(document.getElementById('metExSearch').value);
      };
    });
  }
  renderExList('');

  document.getElementById('metExSearch').oninput = (e)=> renderExList(e.target.value);
}

// ---------- TV ----------
async function renderTv(){
  const tvShow = await getTvShow();
  const isPublished = window.location.protocol === 'http:' || window.location.protocol === 'https:';
  const tvLink = window.location.origin + window.location.pathname + '?view=alumno';
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=8&color=13-35-64&bgcolor=255-255-255&data=' + encodeURIComponent(tvLink);

  const qrBlock = isPublished
    ? `<img src="${qrSrc}" alt="QR para ver tu rutina" width="70" height="70"/>
       <div>
         <p style="font-family:'Oswald';font-style:italic;font-weight:500;color:var(--navy);font-size:12px;margin:0 0 2px;">Escaneá tu QR</p>
         <p style="font-family:'Inter';color:var(--text2);font-size:10px;margin:0;max-width:120px;line-height:1.3;">vé tu rutina desde el celular</p>
       </div>`
    : `<i class="ti ti-qrcode" style="font-size:34px;color:var(--text2);"></i>
       <div>
         <p style="font-family:'Oswald';font-style:italic;font-weight:500;color:var(--navy);font-size:12px;margin:0 0 2px;">QR pendiente</p>
         <p style="font-family:'Inter';color:var(--text2);font-size:10px;margin:0;max-width:140px;line-height:1.3;">se activa solo cuando publiques esta app con un link real</p>
       </div>`;

  app.innerHTML = `
    <div class="tv" style="position:relative;overflow:hidden;">
      <img src="data:image/png;base64,${MASCOT_RUN_B64}" alt="" style="position:absolute;right:-30px;bottom:-30px;width:220px;opacity:0.08;pointer-events:none;"/>
      <div class="tvhead">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="data:image/png;base64,${MASCOT_FACE_B64}" alt="" style="width:30px;"/>
          <span class="tvtitle">Entrenamiento de hoy</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="tvcount">${tvShow.length} en pista</span>
          <button id="fullscreenBtn" style="background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:5px;">
            <i class="ti ti-arrows-maximize"></i> pantalla completa
          </button>
        </div>
      </div>
      <div class="tvgrid" id="tvGrid"></div>
      <div style="position:absolute;left:18px;bottom:18px;background:#fff;border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px;z-index:2;">
        ${qrBlock}
      </div>
    </div>
  `;
  document.getElementById('fullscreenBtn').onclick = ()=>{
    const tvEl = document.querySelector('.tv');
    if(!document.fullscreenElement){
      tvEl.requestFullscreen?.() || tvEl.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  };
  const grid = document.getElementById('tvGrid');

  if(tvShow.length===0){
    app.querySelector('.tv').innerHTML = `<div class="empty"><img src="data:image/png;base64,${MASCOT_PAW_B64}" alt="" style="width:90px;opacity:0.9;margin-bottom:12px;"/><br/>Nadie seleccionado todavia. Activalo desde el panel del profesor.</div>`;
    return;
  }

  for(const item of tvShow){
    const routine = await getRoutine(item.student, item.month);
    const dayData = routine[item.day] || [];
    const card = document.createElement('div');
    card.className = 'tvcard';
    if(dayData.length === 0){
      card.innerHTML = `<p class="name">${item.student}</p><p class="meta">sin rutina cargada</p>`;
      grid.appendChild(card);
      continue;
    }
    const rows = dayData.map(ex => {
      const load = [...ex.weeks].reverse().find(w => w && w.trim() !== '') || '';
      return `
        <div class="tvex">
          <p class="ex">${ex.name}</p>
          <p class="meta">${ex.series} x ${ex.reps}${load ? ' · ' + load : ''}</p>
        </div>
      `;
    }).join('');
    card.innerHTML = `<p class="name">${item.student}</p><div class="tvexlist">${rows}</div>`;
    grid.appendChild(card);
  }
}

function slugify(name){
  return name.trim().toLowerCase()
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

async function applyUrlParams(){
  const params = new URLSearchParams(window.location.search);
  const alumnoParam = params.get('alumno');
  const viewParam = params.get('view');
  if(alumnoParam){
    const students = await getStudents();
    const match = students.find(s => slugify(s) === alumnoParam.toLowerCase());
    if(match){
      currentStudent = match;
      view = 'online';
      [navProf,navAlu,navOnline,navMetrics,navTv].forEach(b=>b.classList.remove('active'));
      navOnline.classList.add('active');
    }
  } else if(viewParam === 'alumno'){
    view = 'alumno';
    [navProf,navAlu,navOnline,navMetrics,navTv].forEach(b=>b.classList.remove('active'));
    navAlu.classList.add('active');
  }
}

applyUrlParams().then(()=> ensureSeeded().then(render));
</script>
